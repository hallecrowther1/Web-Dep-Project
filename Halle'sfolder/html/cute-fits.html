<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Fits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-1: #ffb0da;
            --pink-2: #ff8fc9;
            --pink-3: #ff72ba;
            --light-text: #3c1d3f;
            --soft-card: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 20px 70px;
            font-family: "Quicksand", sans-serif;
            color: var(--light-text);
            text-align: center;
            background:
                radial-gradient(circle at 12% 12%, #ffe1f1 0%, transparent 40%),
                radial-gradient(circle at 88% 20%, #ffc6e6 0%, transparent 36%),
                linear-gradient(135deg, var(--pink-1), var(--pink-2), var(--pink-3));
        }

        h1, h2 {
            margin-bottom: 8px;
            font-family: "Pacifico", cursive;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 2rem;
        }

        p, a {
            font-size: 1rem;
        }

        .site-tabs {
            margin: 0;
            display: flex;
            justify-content: flex-end;
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 100;
        }

        .menu-toggle {
            position: relative;
            display: inline-block;
            text-align: left;
        }

        .menu-toggle summary {
            list-style: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(255, 255, 255, 0.24);
            color: var(--light-text);
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1;
        }

        .menu-toggle summary::-webkit-details-marker {
            display: none;
        }

        .menu-links {
            position: absolute;
            top: 58px;
            right: 0;
            min-width: 270px;
            background: rgba(255, 255, 255, 0.26);
            border: 1px solid rgba(255, 255, 255, 0.48);
            border-radius: 14px;
            padding: 10px;
            box-shadow: 0 12px 24px rgba(90, 17, 61, 0.22);
            z-index: 20;
        }

        .menu-links a {
            display: block;
            text-decoration: none;
            color: var(--light-text);
            font-weight: 700;
            padding: 8px 10px;
            border-radius: 10px;
        }

        .menu-links a:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .menu-toggle[open] summary {
            background: rgba(255, 255, 255, 0.88);
        }

        .menu-toggle[open] .menu-links {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.95);
        }

        .content-card {
            max-width: 780px;
            background: var(--soft-card);
            border: 1px solid rgba(255, 255, 255, 0.36);
            border-radius: 18px;
            padding: 16px 20px;
            margin: 0 auto;
            backdrop-filter: blur(4px);
        }

        .fit-stack {
            position: relative;
            width: 500px;
            height: 430px;
            margin: 14px auto 0;
        }

        .fit-stack img {
            position: absolute;
            width: 210px;
            height: 260px;
            object-fit: cover;
            border-radius: 16px;
            border: 4px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 14px 30px rgba(126, 35, 95, 0.28);
            transition: transform 0.2s ease;
        }

        .fit-stack img:hover {
            transform: scale(1.03);
            z-index: 10;
        }

        .fit-1 {
            left: 30px;
            top: 16px;
            transform: rotate(-8deg);
        }

        .fit-2 {
            left: 190px;
            top: 4px;
            transform: rotate(7deg);
        }

        .fit-3 {
            left: 84px;
            top: 155px;
            transform: rotate(-4deg);
        }

        .fit-4 {
            left: 255px;
            top: 148px;
            transform: rotate(6deg);
        }

        @media (max-width: 760px) {
            .fit-stack {
                width: auto;
                height: auto;
                display: grid;
                grid-template-columns: repeat(2, minmax(120px, 1fr));
                gap: 12px;
            }

            .fit-stack img {
                position: static;
                width: 100%;
                height: 190px;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <nav class="site-tabs">
        <details class="menu-toggle">
            <summary aria-label="Open site navigation menu">☰</summary>
            <div class="menu-links">
                <a href="../index.html">Home</a>
                <a href="gym-excercises.html">Gym Excercises</a>
                <a href="yoga.html">Yoga</a>
                <a href="pilates.html">Pilates</a>
                <a href="cute-fits.html">Cute Fits</a>
                <a href="gym-workout-performance.html">Gym Workout Performance</a>
                <a href="abs.html">ABS</a>
            </div>
        </details>
    </nav>

    <section class="content-card">
        <h1>Cute Fit Inspo</h1>
        <div class="fit-stack">
            <img class="fit-1" src="../assets/img/cute-fit-1.avif" alt="Green gingham tennis workout set">
            <img class="fit-2" src="../assets/img/cute-fit-2.webp" alt="Pink gingham workout set">
            <img class="fit-3" src="../assets/img/cute-fit-3.webp" alt="Red sporty striped workout look">
            <img class="fit-4" src="../assets/img/cute-fit-4.jpeg" alt="Extra cute activewear inspiration">
        </div>
    </section>
</body>
</html>
