<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fashion Joke Generator 💅</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ffd6e0, #ffeef2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }

    h1 {
      color: #ff6f91;
      margin-bottom: 15px;
    }

    #setup {
      font-size: 18px;
      color: #555;
      margin: 20px 0;
      min-height: 60px;
      font-weight: 600;
    }

    #punchline {
      font-size: 18px;
      color: #ff6f91;
      margin: 20px 0;
      min-height: 40px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 1s ease-in;
    }

    #punchline.show {
      opacity: 1;
    }

    button {
      background-color: #ff6f91;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      margin: 10px 5px;
    }

    button:hover {
      background-color: #ff4f75;
    }

    #answerBtn {
      display: none;
    }

    #answerBtn.show {
      display: inline-block;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }

    .floating-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background-color: white;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 1000;
      text-decoration: none;
      font-size: 24px;
    }

    .floating-icon:hover {
      transform: scale(1.1);
    }

    .floating-text {
      position: fixed;
      bottom: 90px;
      right: 20px;
      font-size: 12px;
      color: #555;
      text-align: center;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="../index.html" style="color: #ff6f91; text-decoration: none; font-size: 18px;">← Back to Home</a>
  <h1>💅 Fashion Joke Generator</h1>
  <div id="setup">Click the button for a cute fashion joke!</div>
  <div id="punchline"></div>
  <button onclick="generateJoke()">New Joke ✨</button>
  <button id="answerBtn" onclick="revealAnswer()">Click here for answer</button>
  <div class="footer">Stay stylish 💖</div>
</div>

<div class="floating-text">Click to go to Gym Site</div>
<a href="http://127.0.0.1:5500/index.html" class="floating-icon">💖</a>

<script>
  const jokes = [
    { setup: "Why did the dress go to therapy?", punchline: "It had too many issues to zip up." },
    { setup: "What do you call a fashionable fish?", punchline: "Sofishticated." },
    { setup: "Why don't heels ever get lost?", punchline: "They always follow fashion trends." },
    { setup: "What did the handbag say to the outfit?", punchline: "'You complete me.'" },
    { setup: "Why was the sweater so calm?", punchline: "It just went with the flow-knit." },
    { setup: "Why did the girl bring extra shoes?", punchline: "In case of a fashion emergency." },
    { setup: "What's a fashionista's favorite type of math?", punchline: "Alge-bra." },
    { setup: "Why was the outfit so confident?", punchline: "It knew it slayed." },
    { setup: "Why don't clothes ever argue?", punchline: "They just hang it out." },
    { setup: "What did one accessory say to the other?", punchline: "'You're totally my style.'" }
  ];

  let currentJoke = null;

  function generateJoke() {
    const randomIndex = Math.floor(Math.random() * jokes.length);
    currentJoke = jokes[randomIndex];
    document.getElementById("setup").innerText = currentJoke.setup;
    document.getElementById("punchline").innerText = "";
    document.getElementById("punchline").classList.remove("show");
    document.getElementById("answerBtn").classList.add("show");
  }

  function revealAnswer() {
    if (currentJoke) {
      document.getElementById("punchline").innerText = currentJoke.punchline;
      setTimeout(() => {
        document.getElementById("punchline").classList.add("show");
      }, 10);
    }
  }
</script>

</body>
</html>
